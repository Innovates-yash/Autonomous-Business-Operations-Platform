name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.xml'
          if-no-files-found: ignore

  static-analysis:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Checkstyle + SpotBugs
        # Non-blocking by default (plugin failOn* toggles default to false); set
        # -Dcheckstyle.failOnViolation=true / -Dspotbugs.failOnError=true to gate.
        run: mvn -B -DskipTests checkstyle:check spotbugs:check

      - name: Upload static-analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            **/target/checkstyle-result.xml
            **/target/spotbugsXml.xml
          if-no-files-found: ignore

  dependency-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: OWASP dependency vulnerability scan
        # Report-only by default (failBuildOnCVSS=11). Lower the threshold via
        # -Ddependency-check.failBuildOnCVSS=7 to fail on high-severity CVEs.
        # NVD_API_KEY (optional secret) speeds up the NVD data feed download.
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          EXTRA=""
          if [ -n "${NVD_API_KEY}" ]; then
            EXTRA="-DnvdApiKey=${NVD_API_KEY}"
          fi
          mvn -B -DskipTests org.owasp:dependency-check-maven:aggregate ${EXTRA}

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
          if-no-files-found: ignore

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    env:
      REGISTRY: ${{ secrets.REGISTRY }}
      REGISTRY_NAMESPACE: ${{ secrets.REGISTRY_NAMESPACE }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    strategy:
      matrix:
        module:
          - api-gateway
          - auth-service
          - project-service
          - orchestrator-service
          - ai-provider-gateway
          - ai-chat-service
          - blueprint-service
          - export-service
          - notification-service
          - audit-service
          - agent-workers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for ${{ matrix.module }}
        run: docker build --build-arg MODULE=${{ matrix.module }} -t aisa/${{ matrix.module }}:${{ github.sha }} .

      # Push runs only when registry credentials are configured as repository
      # secrets; otherwise the whole push step is skipped and the job still
      # succeeds (build-only mode).
      - name: Log in to container registry
        if: ${{ env.REGISTRY_USERNAME != '' && env.REGISTRY_PASSWORD != '' }}
        run: |
          echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY:-docker.io}" \
            --username "${REGISTRY_USERNAME}" --password-stdin

      - name: Tag and push image for ${{ matrix.module }}
        if: ${{ env.REGISTRY_USERNAME != '' && env.REGISTRY_PASSWORD != '' }}
        run: |
          REGISTRY="${REGISTRY:-docker.io}"
          NAMESPACE="${REGISTRY_NAMESPACE:-aisa}"
          LOCAL_IMAGE="aisa/${{ matrix.module }}:${{ github.sha }}"
          REMOTE_IMAGE="${REGISTRY}/${NAMESPACE}/${{ matrix.module }}:${{ github.sha }}"
          docker tag "${LOCAL_IMAGE}" "${REMOTE_IMAGE}"
          docker push "${REMOTE_IMAGE}"
