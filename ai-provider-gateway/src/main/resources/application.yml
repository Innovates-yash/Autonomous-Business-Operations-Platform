server:
  port: 8084

spring:
  application:
    name: ai-provider-gateway
  # Local development uses the backing services from docker-compose.infra.yml.
  profiles:
    default: dev

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId:-}]"

# Uniform provider abstraction. Keys are supplied via environment; unset providers
# remain unconfigured and are rejected at selection time (Requirement 20.2).
aisa:
  provider:
    timeout-seconds: 30
    # Deterministic stub clients are registered for every provider by default so the gateway
    # is always routable without external API credentials (Req 20.1). Set to false in
    # environments where only real provider clients should serve traffic.
    stub:
      enabled: true
    selection:
      # How often each instance re-reads the persisted active selection so a selection saved
      # elsewhere takes effect within 5s (Req 20.2).
      refresh-ms: 2000

---
# ===================== dev =====================
# Points at docker-compose.infra.yml backing services on localhost.
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/aisa
    username: aisa
    password: aisapw
  # Flyway owns the schema (Req 20 entities); Hibernate only validates the mapping.
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
    vertex:
      ai:
        gemini:
          project-id: ${GEMINI_PROJECT_ID:}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}

logging:
  level:
    com.aisa: DEBUG

---
# ===================== staging =====================
spring:
  config:
    activate:
      on-profile: staging
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:aisa}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}

logging:
  level:
    root: INFO
    com.aisa: INFO

---
# ===================== prod =====================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:aisa}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.aisa: INFO
