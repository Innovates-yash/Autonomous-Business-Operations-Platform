server:
  port: 8084
  # Defense-in-depth: cap request header size to 64 KB (Requirement 25.6).
  max-http-request-header-size: 65536
  # Request size limit: 1 MB (Requirement 25.6).
  tomcat:
    max-http-form-post-size: 1048576
    max-swallow-size: 1048576
  # Suppress internal details in Spring's default error responses (Requirement 25.7).
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false

spring:
  application:
    name: ai-provider-gateway
  # Local development uses the backing services from docker-compose.infra.yml.
  profiles:
    default: dev
  # Multipart upload size limit: 1 MB (Requirement 25.6).
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  # Distributed tracing to Zipkin (Requirements 27.4, 27.5). Each span carries a start time,
  # duration and the originating service id (spring.application.name). Sampling is full by
  # default (dev); staging/prod lower it and every value is environment-overridable. Emission
  # is retried and fails open via commons' TracingResilienceAutoConfiguration (Req 27.7).
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId:-}]"

# Uniform provider abstraction. Keys are supplied via environment; unset providers
# remain unconfigured and are rejected at selection time (Requirement 20.2).
aisa:
  provider:
    timeout-seconds: 30
    # Failover, unavailability, and usage-retention tuning for the routing facade (Req 20.5–20.8).
    gateway:
      # Consecutive transport/service errors that classify a provider unavailable (Req 20.5).
      consecutive-error-threshold: 3
      # Maximum fallback providers attempted in priority order after the selected one (Req 20.6).
      max-fallbacks: 3
      # Usage-record retention in days; held at or above the 90-day floor (Req 20.8).
      usage-retention-days: 90
    # Deterministic stub clients are registered for every provider by default so the gateway
    # is always routable without external API credentials (Req 20.1). Set to false in
    # environments where only real provider clients should serve traffic.
    stub:
      enabled: true
    selection:
      # How often each instance re-reads the persisted active selection so a selection saved
      # elsewhere takes effect within 5s (Req 20.2).
      refresh-ms: 2000

---
# ===================== dev =====================
# Points at docker-compose.infra.yml backing services on localhost.
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/aisa
    username: aisa
    password: aisapw
  # Flyway owns the schema (Req 20 entities); Hibernate only validates the mapping.
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
    vertex:
      ai:
        gemini:
          project-id: ${GEMINI_PROJECT_ID:}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}

logging:
  level:
    com.aisa: DEBUG

---
# ===================== staging =====================
spring:
  config:
    activate:
      on-profile: staging
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:aisa}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}

# Jasypt at-rest encryption for sensitive properties (Requirement 25.1, 25.3).
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Inter-service mTLS (Requirement 25.1).
server:
  ssl:
    enabled: ${SERVICE_MTLS_ENABLED:true}
    key-store: ${SERVICE_SSL_KEYSTORE:classpath:tls/ai-provider-gateway.p12}
    key-store-password: ${SERVICE_SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    client-auth: need
    trust-store: ${SERVICE_SSL_TRUSTSTORE:classpath:tls/truststore.p12}
    trust-store-password: ${SERVICE_SSL_TRUSTSTORE_PASSWORD}
    trust-store-type: PKCS12

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}

logging:
  level:
    root: INFO
    com.aisa: INFO

---
# ===================== prod =====================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:aisa}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}

# Jasypt at-rest encryption for sensitive properties (Requirement 25.1, 25.3).
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Inter-service mTLS (Requirement 25.1).
server:
  ssl:
    enabled: ${SERVICE_MTLS_ENABLED:true}
    key-store: ${SERVICE_SSL_KEYSTORE:classpath:tls/ai-provider-gateway.p12}
    key-store-password: ${SERVICE_SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    client-auth: need
    trust-store: ${SERVICE_SSL_TRUSTSTORE:classpath:tls/truststore.p12}
    trust-store-password: ${SERVICE_SSL_TRUSTSTORE_PASSWORD}
    trust-store-type: PKCS12

management:
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}

logging:
  level:
    root: WARN
    com.aisa: INFO
