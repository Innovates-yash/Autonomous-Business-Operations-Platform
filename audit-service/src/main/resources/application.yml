server:
  port: 8089

spring:
  application:
    name: audit-service
  # Local development uses the backing services from docker-compose.infra.yml.
  profiles:
    default: dev

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

# ===================== audit service =====================
# Durable recording, ingestion topics, and retention policy (Req 23.1, 23.2, 23.3).
audit:
  recording:
    # Up to 3 retries after the initial attempt (Req 23.2); small backoff keeps the
    # worst-case recording time within the 2-second budget (Req 23.1).
    retry-attempts: 3
    retry-backoff-millis: 100
  messaging:
    events-topic: audit-events
    rejections-topic: audit-rejections
  retention:
    # Minimum 365-day retention (Req 23.3). The store is append-only and never
    # purges, so events are retained well beyond this floor.
    minimum-days: 365
    monitor-cron: "0 0 3 * * *"

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId:-}]"

---
# ===================== dev =====================
# Points at docker-compose.infra.yml backing services on localhost.
# The audit store is append-only; schema is managed by migrations, so JPA only validates.
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/aisa
    username: aisa
    password: aisapw
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: audit-service
      auto-offset-reset: earliest

logging:
  level:
    com.aisa: DEBUG

---
# ===================== staging =====================
spring:
  config:
    activate:
      on-profile: staging
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:aisa}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: audit-service
      auto-offset-reset: earliest

logging:
  level:
    root: INFO
    com.aisa: INFO

---
# ===================== prod =====================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:aisa}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: audit-service
      auto-offset-reset: earliest

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.aisa: INFO
