server:
  port: 8081

spring:
  application:
    name: auth-service
  # Local development uses the backing services from docker-compose.infra.yml.
  profiles:
    default: dev

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId:-}]"

# Token strategy (Requirements 1.3-1.7). The HMAC secret is shared with the API Gateway's
# JwtVerifier so access tokens signed here verify at the edge (set the same value in
# GATEWAY_JWT_SECRET). TTLs are fixed by Requirements 1.4 (15m) and 1.5 (7d).
aisa:
  auth:
    token:
      secret: ${AUTH_JWT_SECRET:}
      issuer: ${AUTH_JWT_ISSUER:aisa-auth}
      access-token-ttl: PT15M
      refresh-token-ttl: P7D

---
# ===================== dev =====================
# Points at docker-compose.infra.yml backing services on localhost.
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/aisa
    username: aisa
    password: aisapw
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: auth-service
      auto-offset-reset: earliest

# Dev-only default signing secret (>= 32 bytes for HS256). Override via AUTH_JWT_SECRET in
# every shared environment; never rely on this value outside local development.
aisa:
  auth:
    token:
      secret: ${AUTH_JWT_SECRET:dev-only-auth-secret-change-me-0123456789abcdef}

logging:
  level:
    com.aisa: DEBUG

---
# ===================== staging =====================
spring:
  config:
    activate:
      on-profile: staging
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:aisa}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: auth-service
      auto-offset-reset: earliest

logging:
  level:
    root: INFO
    com.aisa: INFO

---
# ===================== prod =====================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:aisa}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: auth-service
      auto-offset-reset: latest

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.aisa: INFO
