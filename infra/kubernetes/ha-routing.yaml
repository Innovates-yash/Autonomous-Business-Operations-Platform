# Focused production-readiness manifest for Requirement 28.7-28.9.
# Full Helm parameterization is tracked separately in task 30.1.
apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: Namespace
    metadata:
      name: aisa
      labels:
        app.kubernetes.io/part-of: ai-software-architect-platform

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: api-gateway
      namespace: aisa
      labels: &gatewayLabels
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: ai-software-architect-platform
    spec:
      replicas: 3
      strategy: &rollingStrategy
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 0
          maxSurge: 1
      selector:
        matchLabels: *gatewayLabels
      template:
        metadata:
          labels: *gatewayLabels
        spec:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels: *gatewayLabels
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels: *gatewayLabels
          containers:
            - name: api-gateway
              image: aisa/api-gateway:latest
              imagePullPolicy: IfNotPresent
              ports:
                - name: http
                  containerPort: 8080
              env: &prodEnv
                - name: SPRING_PROFILES_ACTIVE
                  value: prod
              livenessProbe: &livenessProbe
                httpGet:
                  path: /actuator/health/liveness
                  port: http
                periodSeconds: 10
                timeoutSeconds: 10
                failureThreshold: 3
              readinessProbe: &readinessProbe
                httpGet:
                  path: /actuator/health/readiness
                  port: http
                periodSeconds: 10
                timeoutSeconds: 10
                failureThreshold: 3
  - apiVersion: v1
    kind: Service
    metadata:
      name: api-gateway
      namespace: aisa
      labels: *gatewayLabels
    spec:
      selector: *gatewayLabels
      ports:
        - name: http
          port: 8080
          targetPort: http

