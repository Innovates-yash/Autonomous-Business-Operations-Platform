input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Application logs already emit JSON with timestamp, severity, correlationId, message.
  # Pass through; add a tag for routing.
  mutate {
    add_tag => ["aisa"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "aisa-logs-%{+YYYY.MM.dd}"
  }
}
