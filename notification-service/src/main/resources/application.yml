server:
  port: 8088
  # Defense-in-depth: cap request header size to 64 KB (Requirement 25.6).
  max-http-request-header-size: 65536
  # Request size limit: 1 MB (Requirement 25.6).
  tomcat:
    max-http-form-post-size: 1048576
    max-swallow-size: 1048576
  # Suppress internal details in Spring's default error responses (Requirement 25.7).
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false

spring:
  application:
    name: notification-service
  # Local development uses the backing services from docker-compose.infra.yml.
  profiles:
    default: dev
  # Multipart upload size limit: 1 MB (Requirement 25.6).
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  # Distributed tracing to Zipkin (Requirements 27.4, 27.5). Each span carries a start time,
  # duration and the originating service id (spring.application.name). Sampling is full by
  # default (dev); staging/prod lower it and every value is environment-overridable. Emission
  # is retried and fails open via commons' TracingResilienceAutoConfiguration (Req 27.7).
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId:-}]"

# Redis key namespace convention for notification-service (Requirement 26.2):
# - aisa:notify:subscriptions:<userId> — active WebSocket subscription registry
# - aisa:notify:fanout:<projectId>    — last-event markers for resync on reconnect
# All keys use the "aisa:notify:" prefix to isolate from session/cache/rate-limit data.
# TTL: subscription entries expire 1h after last heartbeat; fanout markers expire 24h.
# This enables stateless horizontal scaling — any instance can determine which
# connected clients should receive a fan-out event by consulting the shared registry.

---
# ===================== dev =====================
# Points at docker-compose.infra.yml backing services on localhost.
spring:
  config:
    activate:
      on-profile: dev
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: latest
      enable-auto-commit: false
      properties:
        session.timeout.ms: 30000
    producer:
      acks: all

logging:
  level:
    com.aisa: DEBUG

---
# ===================== staging =====================
spring:
  config:
    activate:
      on-profile: staging
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: notification-service
      auto-offset-reset: latest
      enable-auto-commit: false
      properties:
        session.timeout.ms: 30000
    producer:
      acks: all

# Jasypt at-rest encryption for sensitive properties (Requirement 25.1, 25.3).
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Inter-service mTLS (Requirement 25.1).
server:
  ssl:
    enabled: ${SERVICE_MTLS_ENABLED:true}
    key-store: ${SERVICE_SSL_KEYSTORE:classpath:tls/notification-service.p12}
    key-store-password: ${SERVICE_SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    client-auth: need
    trust-store: ${SERVICE_SSL_TRUSTSTORE:classpath:tls/truststore.p12}
    trust-store-password: ${SERVICE_SSL_TRUSTSTORE_PASSWORD}
    trust-store-type: PKCS12

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}

logging:
  level:
    root: INFO
    com.aisa: INFO

---
# ===================== prod =====================
spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: notification-service
      auto-offset-reset: latest
      enable-auto-commit: false
      properties:
        session.timeout.ms: 30000
    producer:
      acks: all

# Jasypt at-rest encryption for sensitive properties (Requirement 25.1, 25.3).
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Inter-service mTLS (Requirement 25.1).
server:
  ssl:
    enabled: ${SERVICE_MTLS_ENABLED:true}
    key-store: ${SERVICE_SSL_KEYSTORE:classpath:tls/notification-service.p12}
    key-store-password: ${SERVICE_SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    client-auth: need
    trust-store: ${SERVICE_SSL_TRUSTSTORE:classpath:tls/truststore.p12}
    trust-store-password: ${SERVICE_SSL_TRUSTSTORE_PASSWORD}
    trust-store-type: PKCS12

management:
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}

logging:
  level:
    root: WARN
    com.aisa: INFO
