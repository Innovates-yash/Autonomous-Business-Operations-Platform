server:
  port: 8083
  # Defense-in-depth: cap request header size to 64 KB (Requirement 25.6).
  max-http-request-header-size: 65536
  # Request size limit: 1 MB (Requirement 25.6).
  tomcat:
    max-http-form-post-size: 1048576
    max-swallow-size: 1048576
  # Suppress internal details in Spring's default error responses (Requirement 25.7).
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false

spring:
  application:
    name: orchestrator-service
  # Local development uses the backing services from docker-compose.infra.yml.
  profiles:
    default: dev
  # Multipart upload size limit: 1 MB (Requirement 25.6).
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB
  # Redis caching configuration (Requirements 26.2, 26.3, 26.4).
  cache:
    type: redis

# Redis distributed locks for saga step coordination (Requirements 26.2, 26.6).
# Lock keys use prefix "aisa:lock:orchestrator:" to isolate from session/cache keys.
# Lock TTL = 120s matches per-agent invocation timeout (Req 6.4). On instance crash,
# Redis auto-expires the lock so another replica re-queues work within 30s (Req 26.6).
aisa:
  orchestrator:
    # Per-agent invocation timeout: 120 seconds (Requirement 6.4).
    agent-timeout-seconds: 120
    # Maximum total attempts per agent: 1 initial + 3 retries (Requirement 6.5).
    max-agent-attempts: 4
    # Timeout scanner interval and initial delay (milliseconds).
    timeout-scan-interval-ms: 15000
    timeout-scan-initial-delay-ms: 30000
    lock:
      key-prefix: aisa:lock:orchestrator
      expire-after-ms: 120000
  # Kafka topic configuration — defaults suitable for dev (1 partition, replication 1).
  # Production profiles override these for parallelism and fault tolerance.
  kafka:
    topics:
      agent-tasks:
        partitions: 1
        replication-factor: 1
      agent-progress:
        partitions: 1
        replication-factor: 1
      project-state-changes:
        partitions: 1
        replication-factor: 1
      audit-events:
        partitions: 1
        replication-factor: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      # Enable Kubernetes liveness/readiness probe endpoints (Requirements 28.7, 28.8, 28.9).
      # K8s probes target /actuator/health/liveness and /actuator/health/readiness with
      # periodSeconds=10, timeoutSeconds=10, failureThreshold=3.
      probes:
        enabled: true
      show-details: when-authorized
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis,kafka
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  # Distributed tracing to Zipkin (Requirements 27.4, 27.5). Each span carries a start time,
  # duration and the originating service id (spring.application.name). Sampling is full by
  # default (dev); staging/prod lower it and every value is environment-overridable. Emission
  # is retried and fails open via commons' TracingResilienceAutoConfiguration (Req 27.7).
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId:-}]"

---
# ===================== dev =====================
# Points at docker-compose.infra.yml backing services on localhost.
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/aisa
    username: aisa
    password: aisapw
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: orchestrator-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        # Re-queue failed-instance work ≤30s (Req 26.6): 10s session timeout ensures
        # broker detects crashed consumer quickly; 3s heartbeat keeps session alive.
        session.timeout.ms: 10000
        heartbeat.interval.ms: 3000
    producer:
      acks: all
      properties:
        enable.idempotence: true

logging:
  level:
    com.aisa: DEBUG

---
# ===================== staging =====================
spring:
  config:
    activate:
      on-profile: staging
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:aisa}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: orchestrator-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        session.timeout.ms: 10000
        heartbeat.interval.ms: 3000
    producer:
      acks: all
      properties:
        enable.idempotence: true

# Staging topic configuration — moderate parallelism.
aisa:
  kafka:
    topics:
      agent-tasks:
        partitions: ${KAFKA_AGENT_TASKS_PARTITIONS:3}
        replication-factor: ${KAFKA_REPLICATION_FACTOR:2}
      agent-progress:
        partitions: ${KAFKA_AGENT_PROGRESS_PARTITIONS:2}
        replication-factor: ${KAFKA_REPLICATION_FACTOR:2}
      project-state-changes:
        partitions: ${KAFKA_PROJECT_STATE_CHANGES_PARTITIONS:2}
        replication-factor: ${KAFKA_REPLICATION_FACTOR:2}
      audit-events:
        partitions: ${KAFKA_AUDIT_EVENTS_PARTITIONS:2}
        replication-factor: ${KAFKA_REPLICATION_FACTOR:2}

# Jasypt at-rest encryption for sensitive properties (Requirement 25.1, 25.3).
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Inter-service mTLS (Requirement 25.1).
server:
  ssl:
    enabled: ${SERVICE_MTLS_ENABLED:true}
    key-store: ${SERVICE_SSL_KEYSTORE:classpath:tls/orchestrator-service.p12}
    key-store-password: ${SERVICE_SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    client-auth: need
    trust-store: ${SERVICE_SSL_TRUSTSTORE:classpath:tls/truststore.p12}
    trust-store-password: ${SERVICE_SSL_TRUSTSTORE_PASSWORD}
    trust-store-type: PKCS12

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}

logging:
  level:
    root: INFO
    com.aisa: INFO

---
# ===================== prod =====================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:aisa}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: orchestrator-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        session.timeout.ms: 10000
        heartbeat.interval.ms: 3000
    producer:
      acks: all
      properties:
        enable.idempotence: true

# Production topic configuration — high parallelism and replication for fault tolerance.
aisa:
  kafka:
    topics:
      agent-tasks:
        partitions: ${KAFKA_AGENT_TASKS_PARTITIONS:6}
        replication-factor: ${KAFKA_REPLICATION_FACTOR:3}
      agent-progress:
        partitions: ${KAFKA_AGENT_PROGRESS_PARTITIONS:3}
        replication-factor: ${KAFKA_REPLICATION_FACTOR:3}
      project-state-changes:
        partitions: ${KAFKA_PROJECT_STATE_CHANGES_PARTITIONS:3}
        replication-factor: ${KAFKA_REPLICATION_FACTOR:3}
      audit-events:
        partitions: ${KAFKA_AUDIT_EVENTS_PARTITIONS:3}
        replication-factor: ${KAFKA_REPLICATION_FACTOR:3}

# Jasypt at-rest encryption for sensitive properties (Requirement 25.1, 25.3).
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Inter-service mTLS (Requirement 25.1).
server:
  ssl:
    enabled: ${SERVICE_MTLS_ENABLED:true}
    key-store: ${SERVICE_SSL_KEYSTORE:classpath:tls/orchestrator-service.p12}
    key-store-password: ${SERVICE_SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    client-auth: need
    trust-store: ${SERVICE_SSL_TRUSTSTORE:classpath:tls/truststore.p12}
    trust-store-password: ${SERVICE_SSL_TRUSTSTORE_PASSWORD}
    trust-store-type: PKCS12

management:
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}

logging:
  level:
    root: WARN
    com.aisa: INFO
